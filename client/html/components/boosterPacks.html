<div class="booster-packs">

  <h2>Booster Packs</h2>

    <div class="pack-item" data-pack-id="starter_pack">

      <h3>Starter Pack</h3>

      <p>3 cards per pack</p>

      <p>Cost: 100 KeevCoins</p>
