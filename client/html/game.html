<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caomhan Clicker</title>

  <link rel="stylesheet" href="../css/main.css" />
</head>

<body class="game-body">

  <!-- ================================= -->
  <!-- HUD -->
  <!-- ================================= -->

  <div id="hud-container"></div>


  <!-- ================================= -->
  <!-- TOP NAV BUTTONS -->
  <!-- ================================= -->

  <div id="hud-buttons">

    <button id="open-shop-btn">
      Shop
    </button>

    <button id="open-packs-btn">
      Packs
    </button>

    <button id="open-stickers-btn">
      Sticker Book
    </button>

  </div>


  <!-- ================================= -->
  <!-- MAIN GAME AREA -->
  <!-- ================================= -->

  <div class="game-container">

    <div class="click-area">

      <canvas id="gameCanvas"></canvas>

      <button
        id="mainClickButton"
        class="caomhan-click-button"
      >
        Click Caomhan
      </button>

      <div id="floatingTextLayer"></div>

    </div>

  </div>


  <!-- ================================= -->
  <!-- SHOP MODAL -->
  <!-- ================================= -->

  <div id="shop-modal" class="modal hidden">

    <div class="modal-content">

      <button class="close-modal">
        X
      </button>

      <h2>Shop</h2>

      <div id="shop-list"></div>

    </div>

  </div>


  <!-- ================================= -->
  <!-- PACKS MODAL -->
  <!-- ================================= -->

  <div id="packs-modal" class="modal hidden">

    <div class="modal-content">

      <button class="close-modal">
        X
      </button>

      <h2>Booster Packs</h2>

      <div id="packs-list"></div>

    </div>

  </div>


  <!-- ================================= -->
  <!-- STICKER BOOK MODAL -->
  <!-- ================================= -->

  <div id="stickers-modal" class="modal hidden">

    <div class="modal-content">

      <button class="close-modal">
        X
      </button>

      <h2>Sticker Book</h2>

      <div id="sticker-grid"></div>

    </div>

  </div>


  <!-- ================================= -->
  <!-- AUDIO -->
  <!-- ================================= -->

  <audio id="bgMusic" loop>
    <source
      src="../audio/music.mp3"
      type="audio/mp3"
    >
  </audio>


  <!-- ================================= -->
  <!-- MAIN ENTRY -->
  <!-- ================================= -->

  <script
    type="module"
    src="../js/main.js"
  ></script>

</body>
</html>
